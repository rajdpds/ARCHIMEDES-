<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDS GYM</title>

<!-- Cormorant Garamond Font -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">

<style>

/* GENERAL RESET & BACKGROUND */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at center, #7a0000, #2a0000);
    overflow-x: hidden;
}

/* STICKY HEADER */
header {
    position: sticky;
    top: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    z-index: 1000;
}

.logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 700;
    color: white;
}

.join-btn {
    background: white;
    padding: 10px 22px;
    border-radius: 26px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    animation: pulse 2s infinite ease-in-out;
}

.join-btn:hover {
    background: gold;
}

@keyframes pulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.08); }
    100% { transform: scale(1); }
}

/* HERO */
.hero-card {
    width: 90%;
    max-width: 1100px;
    margin: 40px auto 60px auto;
    border-radius: 30px;
    overflow: hidden;
    backdrop-filter: blur(8px);
    animation: fadeIn 1s ease forwards;
}

.hero-card img {
    width: 100%;
    height: 550px;
    object-fit: cover;
}

/* EQUIPMENT GRID */
.equipment-section {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 40px;
    width: 90%;
    max-width: 1100px;
    margin: 50px auto;
}

.equipment-card {
    background: white;
    padding: 20px;
    border-radius: 26px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 12px 35px rgba(0,0,0,0.35);
    transition: .4s ease;
}

.equipment-card img {
    width: 100%;
    height: 170px;
    object-fit: cover;
    border-radius: 18px;
}

.equipment-card:hover {
    transform: translateY(-12px);
    box-shadow: 0 22px 45px rgba(0,0,0,0.5);
    filter: drop-shadow(0 0 8px gold);
}

/* PLANS & LOCATION */
.card {
    background: white;
    width: 90%;
    max-width: 1100px;
    margin: 50px auto;
    padding: 25px;
    border-radius: 28px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    text-align: center;
    animation: fadeIn 1.2s ease forwards;
}

.plans {
    font-size: 22px;
    font-weight: bold;
    line-height: 1.8;
}

.location {
    font-size: 18px;
    font-weight: bold;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.66);
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.modal-content {
    background: white;
    padding: 25px;
    border-radius: 22px;
    width: 90%;
    max-width: 380px;
    animation: fadeIn 0.6s ease;
}

.close {
    float: right;
    cursor: pointer;
    font-weight: bold;
    font-size: 18px;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* RESPONSIVE */
@media(max-width:600px){
    .hero-card img {
        height: 350px;
    }
}

</style>
</head>
<body>

<header>
    <div class="logo">BDS GYM</div>
    <button class="join-btn" onclick="payNow()">JOIN</button>
</header>

<!-- HERO -->
<div class="hero-card">
    <img src="gym-couple.jpg" alt="Gym Action">
</div>

<!-- EQUIPMENT GRID -->
<div class="equipment-section">

    <div class="equipment-card" onclick="openModal('Stationary Bike')">
        <img src="bike.jpg">
        <p>Stationary Bike</p>
    </div>

    <div class="equipment-card" onclick="openModal('Kettlebell')">
        <img src="kettlebell.jpg">
        <p>Kettlebell</p>
    </div>

    <div class="equipment-card" onclick="openModal('Barbell')">
        <img src="barbell.jpg">
        <p>Barbell</p>
    </div>

    <div class="equipment-card" onclick="openModal('Lat Pulldown')">
        <img src="lat.jpg">
        <p>Lat Pulldown</p>
    </div>

    <div class="equipment-card" onclick="openModal('Bench Press')">
        <img src="bench.jpg">
        <p>Bench Press</p>
    </div>

    <div class="equipment-card" onclick="openModal('Squat Rack')">
        <img src="squat.jpg">
        <p>Squat Rack</p>
    </div>

    <div class="equipment-card" onclick="openModal('Dumbbells')">
        <img src="dumbbell.jpg">
        <p>Dumbbells</p>
    </div>

    <div class="equipment-card" onclick="openModal('Treadmill')">
        <img src="treadmill.jpg">
        <p>Treadmill</p>
    </div>

</div>

<!-- PLANS -->
<div class="card plans">
    About Plans<br><br>
    Joining<br>
    1500/-<br><br>
    Monthly<br>
    500/-
</div>

<!-- LOCATION -->
<div class="card location">
    📍 Location: BDS Gym Centre, Guwahati
</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">X</span>
        <h3 id="modalTitle"></h3>
        <p>• Exercise 1<br>• Exercise 2<br>• Exercise 3</p>
    </div>
</div>

<script>

function payNow() {
    window.location.href = "upi://pay?pa=8638136604@ibl&pn=BDSGYM&cu=INR";
}

function openModal(name){
    document.getElementById("modal").style.display="flex";
    document.getElementById("modalTitle").innerText=name;
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
